---
layout: default
---
<article class="post-page">
  <header class="page-hero page-hero--compact">
    <p class="eyebrow">News</p>
    <h1>{{ page.title }}</h1>
    <p class="muted">{{ page.date | date: "%b %-d, %Y" }}{% if page.updated %} · Updated: {{ page.updated }}{% endif %}</p>
  </header>
  <section class="section prose">
    {{ content }}
  </section>
</article>
