lab_name: TAN LAB
tagline: from basic immunology to engineering
intro: We seek to understand the fundamental principles underlying inflammation and
  disease progression across space and time through developing interdisciplinary technologies
  and computational methodologies, and to design molecular switches and allosteric
  perturbations to study biological processes and the quantitative consequences at
  single-cell and systems level.
